# release-plz — automated versioning + releases for the open-media workspace.
# Docs: https://release-plz.dev/docs/config   (workflow uses release-plz/action v0.5)
#
# Every crate shares ONE version via `version.workspace = true` (root Cargo.toml
# `[workspace.package] version`). To keep that single field consistent, all crates
# are pinned to one `version_group` so they bump in lockstep — a change in ANY
# crate (e.g. an `open-media-debrid` fix) moves the whole workspace to the next version.
#
# Only the binary crate `open-media-cli` emits a tag + GitHub Release + changelog; the
# library crates ride the shared version silently (their commits are folded into
# the single root CHANGELOG.md via open-media-cli's `changelog_include`).
#
# On each push to master, release-plz opens/updates a "release PR" (bump +
# Cargo.lock + CHANGELOG). Merging it tags `vX.Y.Z`, creates the GitHub Release,
# and publishes every crate to crates.io in dependency order. Delivery is that
# Release (binary + notes), the crates.io packages, and the grok-insider cachix
# cache — flake.nix reads the same version from Cargo.toml, so the cached path
# tracks it as `open-media-X.Y.Z`.

[workspace]
# Published to crates.io. The `release-plz release` job (on the master push that
# merges the release PR) publishes every crate in dependency order, and the
# `vX.Y.Z` tag + GitHub Release + prebuilt binaries + cachix push are produced
# alongside. Requires CARGO_REGISTRY_TOKEN in the release workflow.
git_only = false
publish = true
# Release the current workspace version whenever it isn't tagged yet (robust; lets
# a direct version bump cut a release and re-baseline at packageable code).
release_always = true
# Only open/update the release PR when a `feat`/`fix` has landed. This keeps the
# release PR meaningful AND skips the expensive per-crate `cargo package` analysis
# on chore/docs/ci/refactor-only pushes (those changes still ride into the next
# release's changelog — release_commits filters the trigger, not the notes).
release_commits = "^(feat|fix)"
# Internal libs + one bin, not a published API: skip cargo-semver-checks.
semver_check = false
# This is an end-user app (not a published library), so treat `feat:` as a
# minor bump even on 0.x — more communicative than the Cargo-SemVer 0.x default
# (where features are patch and only breaking changes bump the minor).
features_always_increment_minor = true
# Defaults for the library crates below: no own tag/release/changelog. open-media-cli
# overrides these to true.
git_tag_enable = false
git_release_enable = false
changelog_update = false
# CRITICAL: every crate must resolve its release baseline to the SINGLE shared tag
# `vX.Y.Z`. Set workspace-wide (not just on open-media-cli): otherwise the libraries fall
# back to the default `om-<lib>-vX.Y.Z` pattern, find no such tag, and get treated
# as "initial release" — replaying the entire pre-1.0 history into a spurious bump.
git_tag_name = "v{{ version }}"
pr_labels = ["release"]

# --- The libraries: share the version group, stay silent individually. ----------
[[package]]
name = "open-media-core"
version_group = "om"
[[package]]
name = "open-media-net"
version_group = "om"
[[package]]
name = "open-media-config"
version_group = "om"
[[package]]
name = "open-media-metadata"
version_group = "om"
[[package]]
name = "open-media-sources"
version_group = "om"
[[package]]
name = "open-media-debrid"
version_group = "om"
[[package]]
name = "open-media-stream"
version_group = "om"
[[package]]
name = "open-media-player"
version_group = "om"
[[package]]
name = "open-media-track"
version_group = "om"
[[package]]
name = "open-media-history"
version_group = "om"
[[package]]
name = "open-media-telemetry"
version_group = "om"
[[package]]
name = "open-media-app"
version_group = "om"
[[package]]
name = "open-media-subs"
version_group = "om"
# open-media-subs depends on the open-subtitle engine from crates.io (the open-subtitle-*
# crates), so `cargo package` resolves it during change detection like every other
# crate — it is no longer excluded from release processing.

# --- The binary: the single release unit (one `vX.Y.Z` tag + Release + changelog).
[[package]]
name = "open-media-cli"
version_group = "om"
git_tag_enable = true
git_release_enable = true
# Tag/release named `vX.Y.Z` (the `git_tag_name` template is set workspace-wide
# above so all crates share this baseline; open-media-cli is the only one that emits it).
git_release_name = "v{{ version }}"
# Keep the single curated changelog at the repo root (path is relative to the
# root Cargo.toml, i.e. the repo root in CI).
changelog_update = true
changelog_path = "CHANGELOG.md"
# open-media-cli is the composition root that depends on every other crate, so a change
# anywhere ships in the binary. Fold all members' commits into the root changelog.
changelog_include = [
    "open-media-core",
    "open-media-net",
    "open-media-config",
    "open-media-metadata",
    "open-media-sources",
    "open-media-debrid",
    "open-media-stream",
    "open-media-player",
    "open-media-track",
    "open-media-history",
    "open-media-telemetry",
    "open-media-subs",
    "open-media-app",
]

# Preserve the curated changelog header (release-plz would otherwise substitute its
# generic default). New version sections are inserted under `## [Unreleased]`.
[changelog]
header = """# Changelog

All notable changes to open-media are documented here. The format follows
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and the project adheres
to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]
"""
# Never drop a breaking change from the changelog, even if its type is skipped.
protect_breaking_commits = true
# Map Conventional Commit types onto Keep-a-Changelog sections; skip the
# internal-only types (chore/ci/build/test/style/docs) so the changelog stays a
# user-facing "what changed" list.
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Changed" },
    { message = "^refactor", group = "Changed" },
    { message = "^revert", group = "Changed" },
    { message = "^deprecat", group = "Deprecated" },
    { message = "^remov", group = "Removed" },
    { message = "^sec(urity)?", group = "Security" },
    { message = "^(chore|ci|build|test|style|docs)", skip = true },
    { message = "^.*", group = "Changed" },
]
