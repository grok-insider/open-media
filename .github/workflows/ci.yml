name: CI

# Status checks (fmt/clippy/test, msrv) run on pull requests only — not on bare
# pushes to master/dev. That way force-pushes and direct pushes do not attach
# failed checks to branch tips.
#
# Nix/cachix publish runs only after a PR into master is merged (or on v* tags /
# manual dispatch). There is no "push came from a PR" flag on push events, so
# post-merge work uses pull_request closed + merged.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # Fast Rust gate on every PR open/sync (and tags / manual dispatch).
  rust:
    name: fmt + clippy + test
    if: >
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Native build glue for aws-lc-sys (rustls crypto) + bundled SQLite.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Hermetic tests only; the live integration tests are #[ignore]d.
      - run: cargo test --workspace

  # Verify the crate still builds on the declared MSRV (rust-version in the root
  # Cargo.toml). The toolchain is pinned to that exact version here so a bump to
  # the MSRV is a deliberate, visible change — rust-toolchain.toml stays on stable
  # for everyday dev/CI builds.
  msrv:
    name: msrv (cargo check @ 1.82)
    if: >
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Native build glue for aws-lc-sys (rustls crypto) + bundled SQLite.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - uses: dtolnay/rust-toolchain@1.82
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  # After a PR is merged into master (or on v* tags / manual dispatch): build the
  # `open-media` package with Nix and push store paths to the grok-insider cachix
  # cache. Not on bare push to master; not on open PR synchronize (no secrets
  # needed for fork PRs either).
  build:
    name: nix build + cachix push (x86_64-linux)
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'pull_request'
          && github.event.action == 'closed'
          && github.event.pull_request.merged == true
          && github.event.pull_request.base.ref == 'master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On PR closed, checkout the merge commit on the base branch.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Configure the grok-insider cache as substituter AND push newly built paths to
      # it (CACHIX_AUTH_TOKEN secret). nix-community is pulled for build deps.
      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: grok-insider
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build open-media
        run: nix build .#open-media -L

      - name: Flake check
        run: nix flake check -L
