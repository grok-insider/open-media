name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast Rust gate on every push/PR: fmt + clippy + the hermetic test suite.
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Native build glue for aws-lc-sys (rustls crypto) + bundled SQLite.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Hermetic tests only; the live integration tests are #[ignore]d.
      - run: cargo test --workspace

  # Verify the crate still builds on the declared MSRV (rust-version in the root
  # Cargo.toml). The toolchain is pinned to that exact version here so a bump to
  # the MSRV is a deliberate, visible change — rust-toolchain.toml stays on stable
  # for everyday dev/CI builds.
  msrv:
    name: msrv (cargo check @ 1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Native build glue for aws-lc-sys (rustls crypto) + bundled SQLite.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - uses: dtolnay/rust-toolchain@1.82
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  # On main/master pushes (plus tags + manual dispatch): build the `open-media` package
  # with Nix and push every store path to the grok-insider cachix cache, so NixOS
  # consumers pointing at github:grok-insider/open-media pull instead of compiling.
  # PRs never publish (no secrets on fork PRs).
  build:
    name: nix build + cachix push (x86_64-linux)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Configure the grok-insider cache as substituter AND push newly built paths to
      # it (CACHIX_AUTH_TOKEN secret). nix-community is pulled for build deps.
      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: grok-insider
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build open-media
        run: nix build .#open-media -L

      - name: Flake check
        run: nix flake check -L
