name: Release

# Automated versioning + GitHub Releases via release-plz (config: release-plz.toml).
#
# Flow on every push to master:
#   * release-plz-pr      — opens/updates the "release PR" (bumps the single
#                           [workspace.package].version + Cargo.lock, regenerates
#                           CHANGELOG.md from Conventional Commits).
#   * release-plz-release — when that PR is merged, creates the `vX.Y.Z` tag +
#                           GitHub Release from the changelog.
#   * upload-binary       — builds a portable static `om` and attaches it.
#
# Cachix is intentionally NOT handled here: ci.yml's `build` job runs on the same
# master push and pushes `om-X.Y.Z` to grok-insider.cachix.org (flake.nix reads the
# version straight from Cargo.toml). Nothing is published to crates.io — see the
# `git_only` setting in release-plz.toml.

on:
  push:
    branches: [master]

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

jobs:
  # Keep the release PR up to date on every push. Merging that PR is what later
  # triggers the `release` job (via the resulting push to master).
  release-plz-pr:
    name: release-plz PR
    if: github.repository_owner == 'grok-insider'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # On a release-PR merge: create the `vX.Y.Z` tag + GitHub Release. Exposes
  # whether a release was cut (and its tag/version) to the artifact job below.
  release-plz-release:
    name: release-plz release
    if: github.repository_owner == 'grok-insider'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Resolve the just-created release's tag/version once (jq on Linux) so the
  # cross-platform matrix (incl. Windows) doesn't need jq.
  resolve:
    name: resolve release tag
    needs: release-plz-release
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - id: r
        env:
          RELEASES: ${{ needs.release-plz-release.outputs.releases }}
        run: |
          set -euo pipefail
          echo "tag=$(echo "$RELEASES" | jq -r '.[0].tag')" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$RELEASES" | jq -r '.[0].version')" >> "$GITHUB_OUTPUT"

  # Build the `om` binary for each target and attach an archive (+ sha256) to the
  # Release. Independent per target (fail-fast: false): one platform failing
  # leaves the others (and the tag/Release/changelog/cachix) intact, re-runnable.
  #
  # om is portable across Unix (rustls + bundled rusqlite, no system OpenSSL/sqlite).
  # zig supplies the cross C toolchain + musl libc for the static Linux builds;
  # aws-lc-sys (rustls crypto) builds aws-lc with CMake+bindgen.
  #
  # Windows (x86_64-pc-windows-msvc) builds natively on windows-latest. The IPC
  # control planes are cfg-gated (crates/{om-player,om-track}/src/ipc.rs): tokio
  # Unix sockets on Unix, tokio named pipes on Windows. aws-lc-sys needs NASM on
  # Windows, supplied by ilammy/setup-nasm; CMake + MSVC ship on the runner.
  artifacts:
    name: ${{ matrix.target }}
    needs: [release-plz-release, resolve]
    if: needs.release-plz-release.outputs.releases_created == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: zig }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: zig }
          - { os: macos-15-intel, target: x86_64-apple-darwin, cross: "" }
          - { os: macos-14, target: aarch64-apple-darwin, cross: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, cross: "" }
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      VERSION: ${{ needs.resolve.outputs.version }}
      TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # zig supplies the cross C toolchain + musl libc for the Linux static builds.
      - name: Install zig
        if: matrix.cross == 'zig'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: matrix.cross == 'zig'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      # aws-lc-sys (rustls crypto) assembles its primitives with NASM on Windows,
      # which the runner doesn't ship. CMake + MSVC are already present.
      - name: Install NASM (aws-lc-sys, Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: ilammy/setup-nasm@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build (zigbuild static)
        if: matrix.cross == 'zig'
        run: cargo zigbuild --release -p om-cli --target "$TARGET"

      - name: Build (native)
        if: matrix.cross != 'zig'
        run: cargo build --release -p om-cli --target ${{ matrix.target }}

      - name: Verify Linux binary is static
        if: matrix.cross == 'zig'
        run: |
          set -euo pipefail
          bin="target/$TARGET/release/om"
          file "$bin"
          if ldd "$bin" 2>&1 | grep -qiE 'libc\.so|GLIBC'; then
            echo "::error::om is dynamically linked against glibc"; exit 1
          fi

      # `shell: bash` runs in Git Bash on the Windows runner too (default there is
      # PowerShell), keeping one portable packaging script across every target.
      - name: Package + upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bin=om
          [ "${RUNNER_OS}" = "Windows" ] && bin=om.exe
          archive="om-${VERSION}-${TARGET}.tar.gz"
          tar -czf "$archive" -C "target/$TARGET/release" "$bin"
          shasum -a 256 "$archive" > "$archive.sha256" 2>/dev/null || sha256sum "$archive" > "$archive.sha256"
          gh release upload "$TAG" "$archive" "$archive.sha256" --clobber
