name: Release

# Automated patch-line versioning + GitHub Releases via release-plz (config:
# release-plz.toml). Repo admins use Manual Version Bump for deliberate
# major/minor releases.
#
# Flow on every push to master:
#   * release-plz-pr      — opens/updates the "release PR" (bumps the single
#                           [workspace.package].version + Cargo.lock, regenerates
#                           CHANGELOG.md from Conventional Commits).
#   * release-plz-release — when that PR is merged, creates the `vX.Y.Z` tag +
#                           GitHub Release from the changelog and publishes crates.
#   * artifacts           — builds release archives for Linux/macOS/Windows.
#
# Cachix is intentionally NOT handled here: ci.yml's `build` job runs on the same
# master push and pushes `open-media-X.Y.Z` to grok-insider.cachix.org (flake.nix reads the
# version straight from Cargo.toml). Crates.io publishing is handled by the
# release-plz release job below.

on:
  push:
    branches: [master]

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

jobs:
  # Keep the release PR up to date on every push. Merging that PR is what later
  # triggers the `release` job (via the resulting push to master).
  release-plz-pr:
    name: release-plz PR
    if: github.repository_owner == 'grok-insider'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # release-plz runs `cargo package` per crate to detect changes, which fetches
    # the crates.io index + deps. That network step is flaky on hosted runners
    # (observed: HTTP/2 framing "Connection reset by peer" mid-download). Make
    # cargo retry transient failures and fetch git deps via the system git CLI
    # (sturdier than the built-in HTTP/2 transport for resets).
    env:
      CARGO_NET_RETRY: "10"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Persist the PAT so the AI changelog step can push to the Release PR branch.
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release-pr)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # PAT so the release PR triggers required CI (a GITHUB_TOKEN-opened PR doesn't).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      # Rewrite the release PR's CHANGELOG section with user-facing, AI-written notes.
      - name: Check out the Release PR
        if: ${{ steps.release-plz.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail
          pr="$(jq -r '.number // empty' <<<"$PR_JSON")"
          ver="$(jq -r '.releases[0].version // empty' <<<"$PR_JSON")"
          [ -n "$pr" ] && [ -n "$ver" ] || { echo "No release PR to enrich."; exit 0; }
          gh pr checkout "$pr"
          { echo "RP_PR=$pr"; echo "RP_VER=$ver"; } >> "$GITHUB_ENV"
      - name: Generate AI changelog into the Release PR
        if: ${{ env.RP_PR != '' }}
        uses: grok-insider/release-changelog-action@v1
        with:
          version: ${{ env.RP_VER }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          project-description: "Cross-platform terminal media streaming app: debrid/torrent sources, mpv playback, Discord RPC, watch history (open-media)"
      - name: Commit AI changelog to the Release PR
        if: ${{ env.RP_PR != '' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "docs(changelog): generate release notes for v${RP_VER}"
            git push
          fi

  # On a release-PR merge: create the `vX.Y.Z` tag + GitHub Release. Exposes
  # whether a release was cut (and its tag/version) to the artifact job below.
  release-plz-release:
    name: release-plz release
    if: github.repository_owner == 'grok-insider'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          # Publish each crate to crates.io in dependency order (publish = true in
          # release-plz.toml). Token is the `open-media-publish` crates.io API key
          # (publish-new + publish-update scopes), owned by grok-insider.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Resolve the just-created release's tag/version once (jq on Linux) so the
  # cross-platform matrix (incl. Windows) doesn't need jq.
  resolve:
    name: resolve release tag
    needs: release-plz-release
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - id: r
        env:
          RELEASES: ${{ needs.release-plz-release.outputs.releases }}
        run: |
          set -euo pipefail
          echo "tag=$(echo "$RELEASES" | jq -r '.[0].tag')" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$RELEASES" | jq -r '.[0].version')" >> "$GITHUB_OUTPUT"

  # Build the `open-media` binary for each target and attach an archive (+ sha256) to the
  # Release. Independent per target (fail-fast: false): one platform failing
  # leaves the others (and the tag/Release/changelog/cachix) intact, re-runnable.
  #
  # open-media is portable across Unix (rustls + bundled rusqlite, no system OpenSSL/sqlite).
  # zig supplies the cross C toolchain + musl libc for the static Linux builds;
  # aws-lc-sys (rustls crypto) builds aws-lc with CMake+bindgen.
  #
  # Windows (x86_64-pc-windows-msvc) builds natively on windows-latest. The IPC
  # control planes are cfg-gated (crates/{open-media-player,open-media-track}/src/ipc.rs): tokio
  # Unix sockets on Unix, tokio named pipes on Windows. aws-lc-sys needs NASM on
  # Windows, supplied by ilammy/setup-nasm; CMake + MSVC ship on the runner.
  artifacts:
    name: ${{ matrix.target }}
    needs: [release-plz-release, resolve]
    if: needs.release-plz-release.outputs.releases_created == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: zig }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: zig }
          - { os: macos-15-intel, target: x86_64-apple-darwin, cross: "" }
          - { os: macos-14, target: aarch64-apple-darwin, cross: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, cross: "" }
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      VERSION: ${{ needs.resolve.outputs.version }}
      TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # zig supplies the cross C toolchain + musl libc for the Linux static builds.
      - name: Install zig
        if: matrix.cross == 'zig'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: matrix.cross == 'zig'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      # aws-lc-sys (rustls crypto) assembles its primitives with NASM on Windows,
      # which the runner doesn't ship. CMake + MSVC are already present.
      - name: Install NASM (aws-lc-sys, Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: ilammy/setup-nasm@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build (zigbuild static)
        if: matrix.cross == 'zig'
        run: cargo zigbuild --release -p open-media-cli --target "$TARGET"

      - name: Build (native)
        if: matrix.cross != 'zig'
        run: cargo build --release -p open-media-cli --target ${{ matrix.target }}

      - name: Verify Linux binary is static
        if: matrix.cross == 'zig'
        run: |
          set -euo pipefail
          bin="target/$TARGET/release/open-media"
          file "$bin"
          if ldd "$bin" 2>&1 | grep -qiE 'libc\.so|GLIBC'; then
            echo "::error::open-media is dynamically linked against glibc"; exit 1
          fi

      # `shell: bash` runs in Git Bash on the Windows runner too (default there is
      # PowerShell), keeping one portable packaging script across every target.
      - name: Package + upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bin=open-media
          [ "${RUNNER_OS}" = "Windows" ] && bin=open-media.exe
          archive="open-media-${VERSION}-${TARGET}.tar.gz"
          tar -czf "$archive" -C "target/$TARGET/release" "$bin"
          shasum -a 256 "$archive" > "$archive.sha256" 2>/dev/null || sha256sum "$archive" > "$archive.sha256"
          gh release upload "$TAG" "$archive" "$archive.sha256" --clobber
